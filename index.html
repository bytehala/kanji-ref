<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字 — Kanji Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+JP:wght@400;500;700&family=Public+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="header-top">
        <h1 class="site-title">
          <span class="title-jp">漢字</span>
          <span class="title-en">Kanji Reference</span>
        </h1>
        <button class="search-toggle" id="search-toggle" type="button" aria-label="Search" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
          </svg>
        </button>
      </div>
      <div class="search-wrap">
        <input
          type="search"
          id="search"
          class="search-input"
          placeholder="Search kanji, kana, romaji, meaning, components…"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="search-meta" id="search-meta"></div>
      </div>
    </div>
  </header>

  <div class="detail-backdrop" id="detail-backdrop"></div>

  <main class="layout">
    <section class="results-pane" id="results-pane">
      <ul class="results-list" id="results-list"></ul>
      <div class="empty-state" id="empty-state" hidden>
        <p>No entries found.</p>
      </div>
    </section>

    <aside class="detail-pane" id="detail-pane">
      <button class="detail-close" id="detail-close" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
      </button>
      <div class="detail-placeholder" id="detail-placeholder">
        <p class="placeholder-mark">⌬</p>
        <p>Select a kanji to view its details.</p>
      </div>
      <article class="detail-content" id="detail-content" hidden></article>
    </aside>
  </main>

  <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
