<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字 — Kanji Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+JP:wght@400;500;700&family=Public+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">
        <span class="title-jp">漢字</span>
        <span class="title-en">Kanji Reference</span>
      </h1>
      <div class="search-wrap">
        <input
          type="search"
          id="search"
          class="search-input"
          placeholder="Search kanji, kana, romaji, meaning, components…"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="search-meta" id="search-meta"></div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="results-pane" id="results-pane">
      <ul class="results-list" id="results-list"></ul>
      <div class="empty-state" id="empty-state" hidden>
        <p>No entries found.</p>
      </div>
    </section>

    <aside class="detail-pane" id="detail-pane">
      <div class="detail-placeholder" id="detail-placeholder">
        <p class="placeholder-mark">⌬</p>
        <p>Select a kanji to view its details.</p>
      </div>
      <article class="detail-content" id="detail-content" hidden></article>
    </aside>
  </main>

  <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
